<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>motorista particular</title>
    <style>
        body {
            background-color: rgb(224, 224, 255);
            margin: 0;
            max-width: 300px;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        .box {
            padding: 8%;
            background-color: rgb(202, 193, 245);
            width: 50%;
            position: absolute;
            top: 50%;
            border-radius: 20px;
            left: 20%;
            z-index: 0;
        }
        .carro {
            z-index: 1;
            position: absolute;
            top: 32%;
            left: 28%;
            width: 50%;
        }
        .sombra {
            position: absolute;
            font: normal 70pt arial black;
            height: 20%;
            top: 33%;
            left: 33%;
            text-shadow: 0 20px 27px rgba(0,0,0,0.7);
        }
        .t1 {
            position: absolute;
            top: 15%;
            left: 20%;
            font: 900 20pt arial black;
        }
    </style>
</head>
<body>
   <div class="container">
   <div class="box"></div>
   <img src="imagens/carro frente.png" class="carro">
   <h1 class="sombra">-------</h1>
   <h1 class="sombra">-------</h1>
   <h1 class="sombra">-------</h1>
   <h1 class="sombra">-------</h1>
   <h1 class="sombra">-------</h1>
   <h1 class="sombra">-------</h1>
   <h1 class="sombra">-------</h1>
   <h1 class="sombra">-------</h1>
   <h1 class="t1">Sua corrida com conforto e segurança</h1>
   </div> 
</body>
</html>
