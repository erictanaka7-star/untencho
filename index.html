<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background-color: rgb(196, 228, 255);
            margin: 0;
        }
        .base2 {
            background-color: rgb(160, 185, 255);
            width: 60%;
            color: rgb(160, 185, 255);
            height: 30%;
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-30%);
            border-radius: 15px;
            z-index: 0;
            max-width: 425px;
        }
        .carro {
            width: 40%;
            position: absolute;
            top: 26.5%;
            left: 70%;
            max-width: 200px;
            transform: translate(-50%); /*p centralizar*/
        }
    </style>
</head>
<body>
    <h1 class="base2">.</h1>
    <img src="imagens/carro frente.png" class="carro">
</body>
</html>
